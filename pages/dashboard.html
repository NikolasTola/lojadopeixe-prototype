<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../styles/dashboard.css" />
</head>

<body>

    <!-- Header -->
    <header class="header">
        <span id="header-username" class="header-username"></span>
        <button id="btn-logout" class="btn-logout">Sair</button>
    </header>

    <!-- Main -->
    <main class="main-content">
        <div class="page-actions">
            <button id="btn-new-service" class="btn-primary">Criar nova nota</button>
        </div>
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="Buscar por nome, modelo ou cor..." />
            <select id="status-filter">
                <option value="">Todos os status</option>
                <option value="Parado">Parado</option>
                <option value="Andamento">Andamento</option>
                <option value="Concluido">Concluído</option>
                <option value="Cancelado">Cancelado</option>
            </select>
        </div>
        <div id="card-list"></div>
    </main>

    <!-- Form Modal -->
    <div id="form-modal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title">Nova nota de serviço</span>
                <button id="btn-close-form" class="btn-close-modal">&#x2715;</button>
            </div>

            <form id="service-form" novalidate>
                <div class="form-grid">

                    <div class="form-group">
                        <label for="field-name">Nome</label>
                        <input type="text" id="field-name" maxlength="64" pattern="[A-Za-zÀ-ÖØ-öø-ÿ\s]+"
                            placeholder="Nome do cliente" />
                    </div>

                    <div class="form-group">
                        <label for="field-phone">Telefone</label>
                        <input type="text" id="field-phone" placeholder="(XX) XXXXX-XXXX" />
                    </div>

                    <div class="form-group">
                        <label for="field-address">Endereço</label>
                        <input type="text" id="field-address" placeholder="Rua, Número" />
                    </div>

                    <div class="form-group">
                        <label for="field-cpf">CPF</label>
                        <input type="text" id="field-cpf" placeholder="XXX.XXX.XXX-XX" />
                    </div>

                    <div class="form-group">
                        <label for="field-model">Modelo</label>
                        <input type="text" id="field-model" maxlength="100" placeholder="Modelo do aparelho" />
                    </div>

                    <div class="form-group">
                        <label for="field-color">Cor</label>
                        <input type="text" id="field-color" maxlength="64" placeholder="Cor do aparelho" />
                    </div>

                    <div class="form-group">
                        <label for="field-imei">IMEI</label>
                        <input type="text" id="field-imei" maxlength="20" inputmode="numeric"
                            placeholder="Somente números" />
                    </div>

                    <div class="form-group">
                        <label for="field-value">Valor (R$)</label>
                        <input type="text" id="field-value" inputmode="decimal" placeholder="0,00" />
                    </div>

                    <div class="form-group">
                        <label for="field-date">Data</label>
                        <input type="date" id="field-date" />
                    </div>

                    <div class="form-group full-width">
                        <label for="field-technical-report">Laudo técnico</label>
                        <textarea id="field-technical-report" rows="3"
                            placeholder="Descreva o laudo técnico"></textarea>
                    </div>

                    <div class="form-group full-width">
                        <label for="field-observations">Observações</label>
                        <textarea id="field-observations" rows="3" placeholder="Observações adicionais"></textarea>
                    </div>

                    <div class="form-group full-width">
                        <label for="field-photo">Foto do aparelho</label>
                        <input type="file" id="field-photo" accept="image/*" />
                        <img id="photo-preview" class="photo-preview" alt="Pré-visualização" />
                    </div>

                    <div class="form-group full-width">
                        <label>Assinatura</label>
                        <canvas id="signature-canvas" class="signature-canvas"></canvas>
                        <button type="button" id="btn-clear-signature" class="btn-clear-signature">Limpar</button>
                    </div>

                    <p id="form-error" class="form-error" role="alert" aria-live="polite"></p>

                </div>

                <div class="modal-footer">
                    <button type="button" id="btn-cancel-form" class="btn-secondary">Cancelar</button>
                    <button type="submit" class="btn-primary">Criar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Detail Modal -->
    <div id="detail-modal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title">Detalhes do serviço</span>
                <button id="btn-close-detail" class="btn-close-modal">&#x2715;</button>
            </div>

            <div class="detail-grid">
                <div class="detail-group">
                    <span class="detail-label">ID</span>
                    <span id="detail-id" class="detail-value"></span>
                </div>
                <div class="detail-group">
                    <span class="detail-label">Status</span>
                    <select id="detail-status-select" class="select-status select-status-inline"></select>
                </div>
                <div class="detail-group">
                    <span class="detail-label">Nome</span>
                    <span id="detail-name" class="detail-value"></span>
                </div>
                <div class="detail-group">
                    <span class="detail-label">Telefone</span>
                    <span id="detail-phone" class="detail-value"></span>
                </div>
                <div class="detail-group full-width">
                    <span class="detail-label">Endereço</span>
                    <span id="detail-address" class="detail-value"></span>
                </div>
                <div class="detail-group">
                    <span class="detail-label">CPF</span>
                    <span id="detail-cpf" class="detail-value"></span>
                </div>
                <div class="detail-group">
                    <span class="detail-label">Modelo</span>
                    <span id="detail-model" class="detail-value"></span>
                </div>
                <div class="detail-group">
                    <span class="detail-label">Cor</span>
                    <span id="detail-color" class="detail-value"></span>
                </div>
                <div class="detail-group">
                    <span class="detail-label">IMEI</span>
                    <span id="detail-imei" class="detail-value"></span>
                </div>
                <div class="detail-group">
                    <span class="detail-label">Valor</span>
                    <span id="detail-value" class="detail-value"></span>
                </div>
                <div class="detail-group">
                    <span class="detail-label">Data</span>
                    <span id="detail-date" class="detail-value"></span>
                </div>
                <div class="detail-group full-width">
                    <span class="detail-label">Laudo técnico</span>
                    <span id="detail-technical-report" class="detail-value"></span>
                </div>
                <div class="detail-group full-width">
                    <span class="detail-label">Observações</span>
                    <span id="detail-observations" class="detail-value"></span>
                </div>
                <div class="detail-group full-width">
                    <span class="detail-label">Foto do aparelho</span>
                    <span id="detail-photo" class="detail-value"></span>
                </div>
                <div class="detail-group full-width">
                    <span class="detail-label">Assinatura</span>
                    <div id="detail-signature"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Delete Modal -->
    <div id="delete-modal" class="modal-overlay">
        <div class="modal modal-sm">
            <div class="modal-header">
                <span class="modal-title">Excluir serviço</span>
                <button id="btn-close-delete" class="btn-close-modal">&#x2715;</button>
            </div>
            <p class="delete-message">Tem certeza que deseja excluir este serviço? Esta ação não pode ser desfeita.</p>
            <div class="modal-footer">
                <button id="btn-cancel-delete" class="btn-secondary">Cancelar</button>
                <button id="btn-confirm-delete" class="btn-danger">Excluir</button>
            </div>
        </div>
    </div>

    <!-- Export Modal -->
    <div id="export-modal" class="modal-overlay">
        <div class="modal modal-export">
            <div class="modal-header">
                <span class="modal-title">Pré-visualização</span>
                <button id="btn-close-export" class="btn-close-modal">&#x2715;</button>
            </div>
            <div id="export-preview" class="export-preview"></div>
            <div class="modal-footer">
                <button id="btn-cancel-export" class="btn-secondary">Cancelar</button>
                <button id="btn-download-pdf" class="btn-primary">Exportar PDF</button>
            </div>
        </div>
    </div>

    <script src="../scripts/auth.js"></script>
    <script src="../scripts/services.js"></script>
    <script src="../scripts/export.js"></script>
    <script src="../scripts/dashboard.js"></script>
</body>

</html>
