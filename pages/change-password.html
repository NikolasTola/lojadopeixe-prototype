<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Definir senha</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../styles/login.css" />
    <link rel="stylesheet" href="../styles/change-password.css" />
  </head>
  <body>
    <div class="login-wrapper">
      <div class="login-card">
        <h1>Definir senha</h1>
        <p class="subtitle">Crie uma nova senha para continuar</p>

        <div class="password-rules">
          <p class="rules-title">A senha deve conter:</p>
          <ul>
            <li id="rule-length">Mínimo de 5 caracteres</li>
            <li id="rule-upper">Letra maiúscula</li>
            <li id="rule-lower">Letra minúscula</li>
            <li id="rule-number">Número</li>
            <li id="rule-special">Caractere especial (!@#$%&*)</li>
          </ul>
        </div>

        <form id="change-password-form" novalidate>
          <div class="form-group">
            <input
              type="password"
              id="new-password"
              placeholder="Nova senha"
              autocomplete="new-password"
            />
          </div>
          <div class="form-group">
            <input
              type="password"
              id="confirm-password"
              placeholder="Confirmar senha"
              autocomplete="new-password"
            />
          </div>

          <p id="error-message" class="error-message" role="alert" aria-live="polite"></p>

          <button type="submit" class="btn-submit">Definir senha</button>
        </form>
      </div>
    </div>

    <script src="../scripts/auth.js"></script>
    <script src="../scripts/change-password.js"></script>
  </body>
</html>
